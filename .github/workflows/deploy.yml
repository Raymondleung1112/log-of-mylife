name: Deploy Backend to Cloud Run

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**' # 確保只有後端變動才觸發，節省 GitHub Actions 額度

permissions:
  contents: 'read'
  id-token: 'write' # WIF 鑑權核心權限

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Google Auth
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: '${{ vars.GCP_WIF_PROVIDER }}'
          service_account: '${{ vars.GCP_SERVICE_ACCOUNT }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker
        run: gcloud auth configure-docker asia-east2-docker.pkg.dev

      - name: Build and Push Container
        run: |-
          docker build -t asia-east2-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/log-of-mylife-repo/backend:${{ github.sha }} ./backend
          docker push asia-east2-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/log-of-mylife-repo/backend:${{ github.sha }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: backend-api
          region: ${{ vars.GCP_REGION }}
          image: asia-east2-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/log-of-mylife-repo/backend:${{ github.sha }}
          # 關鍵修正：指定 Cloud Run 運行身份
          service_account: log-of-mylife-backend@gcp-hk-sandbox.iam.gserviceaccount.com
          env_vars: |
            PROJECT_ID=${{ vars.GCP_PROJECT_ID }}
            FIRESTORE_DATABASE_ID=log-of-mylife-db
