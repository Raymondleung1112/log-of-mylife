name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**' # 只有前端代碼變動才觸發

permissions:
  checks: write
  contents: read
  deployments: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install and Build Frontend
        run: npm ci && npm run build
        working-directory: frontend # 指令在此資料夾執行

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GCP_HK_SANDBOX }}
          channelId: live
          projectId: gcp-hk-sandbox
          entryPoint: frontend # 告訴 Firebase 設定檔在 frontend 目錄內